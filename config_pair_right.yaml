# Camera 2 (Center Lens) Intrinsics
Camera1.fx: 501.0  # Same numbers as Camera 2 above
Camera1.fy: 501.0
Camera1.cx: 322.0
Camera1.cy: 238.0

# Camera 3 (Right Lens) Intrinsics
Camera2.fx: 499.0
Camera2.fy: 499.0
Camera2.cx: 318.0
Camera2.cy: 242.0

# Extrinsics: Transformation from Camera 3 to Camera 2
# This matrix rotates 30 degrees in the opposite direction
Camera.T_c1_c2: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ 0.866,  0.000, -0.500, -0.06,
           0.000,  1.000,  0.000,  0.00,
           0.500,  0.000,  0.866,  0.00,
           0.000,  0.000,  0.000,  1.00 ]
